<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login_contenedor">
        <section class="login_visual">
            <div class="overlay_text">
                <h1>¡Bienvenido!</h1>
                <p>Sistema de faturación e inventario motoRep Emanuel</p>
            </div>
        </section>

        <section class="login_form_section">
            <h2 class="text-login">Iniciar sesión</h2>
            <form  id="formulario">
                <div class="username">
                    <label for="username"class="txt-from" >USUARIO</label>
                    <input type="text" id="username" class="input_user">
                </div>
                <div class="contrasena">
                    <label for="passwoord" class="txt-from" >CONTRASEÑA</label>
                    <input type="password" id="password" class="input_user">
                </div>
                <button type="submit" class="btn_iniciar">INICIAR</button>

                <p class="errorLogin" id="errorMensaje"></p>
            </form>
        </section>

    </main>
    <div id="pantalla-carga" class="overlay-carga">
        <div class="spinner-contenedor">
            <div class="spinner"></div>
            <p>Autentificando, por favor espere...</p>
        </div>

        </div>

    </div>


    <script type="module" src="./auth.js"></script>

</body>
</html>
