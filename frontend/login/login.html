<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login_contenedor">
        <section class="login_visual">
            <div class="overlay_text">
                <h1>¡Bienvenido!</h1>
                <p>Sistema de faturación e inventario motoRep Emanuel</p>
            </div>
        </section>

        <section class="login_form_section">
            <h2 class="text-login">Iniciar sesión</h2>
            <form action="post" class="fromulario">
                <div class="username">
                    <label for="usuario"class="txt-from">USUARIO</label>
                    <input type="text" id="usuario"  class="input_user">
                </div>
                <div class="contrasena">
                    <label for="passwoord" class="txt-from" >CONTRASEÑA</label>
                    <input type="password" id="password" class="input_user">
                </div>
                <button type="submit" class="btn_iniciar">INICIAR</button>

                <p class="errorLogin">error</p>
            </form>
        </section>

    </main>

    <script href="auth.js"></script>

</body>
</html>
